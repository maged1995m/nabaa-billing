name: بناء APK

# يعمل تلقائياً عند رفع تحديث لفرع main، أو يدوياً بالضغط على "Run workflow" من تبويب Actions
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4

      - name: تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: تجهيز Java (مطلوب لبناء أندرويد)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: تثبيت الاعتماديات (Capacitor + xlsx وملفاتها الجاهزة تلقائياً)
        run: npm install

      - name: إضافة منصة أندرويد
        run: npx cap add android

      - name: مزامنة الملفات مع مشروع أندرويد
        run: npx cap sync android

      - name: بناء ملف APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: رفع APK كملف تحميل جاهز
        uses: actions/upload-artifact@v4
        with:
          name: nabaa-billing-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
