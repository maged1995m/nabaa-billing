name: بناء APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4

      - name: تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: تجهيز Java (مطلوب لبناء أندرويد)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: تثبيت الاعتماديات
        run: npm install

      - name: إنشاء مجلد dist وتحضير الملفات
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r js dist/
          cp -r icons dist/
          cp service-worker.js dist/
          cp manifest.json dist/

      - name: إضافة منصة أندرويد
        run: npx cap add android

      - name: مزامنة الملفات
        run: npx cap sync android

      - name: بناء ملف APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: nabaa-billing-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
